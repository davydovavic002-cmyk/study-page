<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Security-Policy" content="font-src 'self' https://fonts.gstatic.com;">
    <meta charset="UTF-8">
    <title>Учебный класс - ChessRad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/study.css">
    <style>
        /* Оставляем только те специфичные стили, которых нет в study.css */
        .board-container {
            position: relative;
            width: 100%;
            /* Доска будет расти до предела высоты экрана минус отступы */
            max-width: calc(100vh - 180px);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        #myBoard { width: 100%; height: 100%; }

        /* Фикс для удаления табов (если нет в основном CSS) */
        .delete-tab {
            position: absolute;
            top: -5px; right: -5px;
            background: #e74c3c; color: white;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; display: flex;
            align-items: center; justify-content: center;
            visibility: hidden;
        }
        .tab-item:hover .delete-tab { visibility: visible; }

        /* Библиотека */
        .folder-card {
            cursor: pointer; border: 1px solid #ddd; padding: 15px; border-radius: 8px;
            text-align: center; transition: 0.3s;
        }
        .folder-card:hover { background: #f0f0f0; transform: translateY(-2px); }
        .lib-nav-back { grid-column: 1 / -1; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header class="lobby-header">
        <div class="logo-area">
            <h1>ChessRad <span class="badge">STUDY</span></h1>
        </div>
        <div id="user-status" class="user-badge-text">Загрузка...</div>
    </header>

    <div class="main-layout">
        <aside class="tabs-sidebar">
            <div id="tabs-list"></div>
            <button class="add-tab-btn" id="add-tab-btn" title="Добавить демо-вкладку" style="display: none;">
                <i class="fas fa-plus"></i>
            </button>
        </aside>

        <div class="board-section">
            <div id="status-msg"></div>
            <div class="board-container">
                <div id="myBoard"></div>
            </div>

            <div class="board-controls" id="teacher-tools" style="display: none; justify-content: center; gap: 10px; margin-top: 15px;">
                <button class="btn-secondary" id="flip-btn"><i class="fas fa-sync"></i> Разворот</button>
            </div>
        </div>

        <aside class="info-panel">
            <div id="video-chat-container"></div>

            <div class="room-info">
                <h3 style="margin: 0; font-size: 16px;">Комната: <span id="room-id-display">---</span></h3>
            </div>

            <div id="game-info-block" style="display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;">
                <div id="moves-history-block" class="chat-area">
                    <em>История ходов...</em>
                </div>
            </div>

            <div id="demo-controls-block" style="display: none; flex-direction: column; gap: 10px; margin-bottom: 10px;">
                <button class="btn-primary-sm" id="editor-btn">
                    <i class="fas fa-puzzle-piece"></i> ⚙️ РЕДАКТОР ПОЗИЦИИ
                </button>
                <button class="btn-secondary" id="lib-btn">
                    <i class="fas fa-book"></i> 📚 БИБЛИОТЕКА ПОЗИЦИЙ
                </button>
            </div>

            <button class="btn-logout" onclick="window.location.href='/lobby.html'">Покинуть класс</button>
        </aside>
    </div>

    <div id="editor-modal" class="modal-overlay" style="display: none;">
        <div class="editor-modal">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; width: 100%; margin-bottom: 15px;">
                <h3>🧩 Редактор позиции</h3>
                <button onclick="document.getElementById('editor-modal').style.display='none'" class="close-btn" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
            </div>

            <div class="cr-board-wrapper">
                <div id="board-editor"></div>
            </div>

            <div class="editor-tools">
                <button class="btn-secondary" id="editor-start-btn">Начальная</button>
                <button class="btn-danger-light" id="editor-clear-btn">Очистить</button>
                <button class="btn-primary-sm" id="apply-editor-btn" style="background: #27ae60;">ПРИМЕНИТЬ</button>
            </div>
        </div>
    </div>

    <div id="lib-modal" class="modal-overlay" style="display: none;">
        <div class="editor-modal" style="width: 700px; max-width: 95vw;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; width: 100%; margin-bottom:15px;">
                <h3>📚 Библиотека позиций</h3>
                <button onclick="document.getElementById('lib-modal').style.display='none'" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
            </div>
            <div id="lib-content" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 70vh; overflow-y: auto; padding: 10px; width: 100%;">
            </div>
        </div>
    </div>

    <script src="/js/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/ChessradBoard.js"></script>
    <script src="/js/study.js"></script>
</body>
</html>
